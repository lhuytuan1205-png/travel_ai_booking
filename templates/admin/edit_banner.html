<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa banner - TravelAI Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/admin.css') }}">
</head>
<body>

<div class="admin-layout">

    <aside class="sidebar">
        <div class="admin-logo">
            <h2>TravelAI</h2>
            <p>Admin Panel</p>
        </div>

        <nav class="admin-menu">
            <a href="/admin/dashboard">Tổng quan</a>
            <a href="/admin/tours">Quản lý tour</a>
            <a href="/admin/banners" class="active">Quản lý banner</a>
            <a href="/admin/bookings">Quản lý đơn</a>
            <a href="/admin/users">Người dùng</a>
            <a href="/">Về website</a>
            <a href="/logout">Đăng xuất</a>
        </nav>
    </aside>

    <main class="admin-content">
        <div class="admin-topbar">
            <div>
                <h1>Sửa banner</h1>
                <p>Cập nhật nội dung và ảnh banner trang chủ.</p>
            </div>

            <div class="topbar-actions">
                <a href="/admin/banners" class="secondary">Quay lại</a>
            </div>
        </div>

        <section class="admin-card">
            <form class="admin-form" method="POST" enctype="multipart/form-data">

                <div class="form-group full">
                    <label>Tiêu đề chính</label>
                    <input type="text" name="title" value="{{ banner[1] }}" required>
                </div>

                <div class="form-group full">
                    <label>Tiêu đề phụ</label>
                    <input type="text" name="subtitle" value="{{ banner[2] }}">
                </div>

                <div class="form-group full">
                    <label>Mô tả</label>
                    <textarea name="description" rows="5">{{ banner[3] }}</textarea>
                </div>

                <div class="form-group full">
                    <label>Ảnh banner hiện tại</label>

                    <div class="banner-preview-box">
                        <img src="{{ url_for('static', filename='images/banners/' + banner[4]) }}"
                             alt="{{ banner[1] }}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Ảnh banner mới</label>
                    <input type="file" name="image" accept="image/*">
                    <small>Nếu không chọn ảnh mới, hệ thống sẽ giữ ảnh cũ.</small>
                </div>

                <div class="form-group">
                    <label>Trạng thái</label>
                    <select name="status">
                        <option value="active" {% if banner[5] == "active" %}selected{% endif %}>
                            Đang hiển thị
                        </option>

                        <option value="inactive" {% if banner[5] == "inactive" %}selected{% endif %}>
                            Ẩn banner
                        </option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-btn">Lưu thay đổi</button>
                    <a href="/admin/banners" class="cancel-btn">Hủy</a>
                </div>

            </form>
        </section>
    </main>

</div>

</body>
</html>
